- type: entity
  parent: CratePlastic
  id: CrateSprayPaint
  name: spray paint crate
  description: A box containing some assorted spray paint.
  suffix: Filled
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:NestedSelector
        rolls: !type:RangeNumberSelector
          range: 6, 12
        tableId: SprayPaintTable

- type: entity
  name: spray paint spawner
  suffix: 1, 60%
  id: SprayPaintSpawner
  parent: MarkerBase
  components:
  - type: Sprite
    layers:
    - state: red
    - sprite: _Floof/Objects/Fun/spraycans.rsi
      state: death2
  - type: EntityTableSpawner
    table: !type:NestedSelector
      tableId: SprayPaintTable
      prob: 0.6

- type: entityTable
  id: SprayPaintTable
  table: !type:GroupSelector
    children:
    # Common Group
    - !type:GroupSelector
      weight: 75
      children:
      - !type:EntSelector
        id: SprayPaintRed
      - !type:EntSelector
        id: SprayPaintBlue
      - !type:EntSelector
        id: SprayPaintGreen
      - !type:EntSelector
        id: SprayPaintBlack
      - !type:EntSelector
        id: SprayPaintOrange
      - !type:EntSelector
        id: SprayPaintPurple
      - !type:EntSelector
        id: SprayPaintWhite
    # Uncommon Group
    - !type:GroupSelector
      weight: 25
      children:
      - !type:EntSelector
        id: DeathPaint
      - !type:EntSelector
        id: DeathPaintTwo
      - !type:EntSelector
        id: FunnyPaint
        weight: 0.5
